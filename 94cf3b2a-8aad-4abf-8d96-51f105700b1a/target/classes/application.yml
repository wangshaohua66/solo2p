server:
  port: 8080

spring:
  application:
    name: script-kill-manager
  datasource:
    url: jdbc:sqlite:./data/scriptkill.db
    driver-class-name: org.sqlite.JDBC
    username: admin
    password: admin123
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: true
    layout: BaseLayout
    css:
      - /dark-theme.css
  group-configs:
    - group: 'player'
      display-name: '玩家端'
      paths-to-match: /api/player/**
    - group: 'dm'
      display-name: 'DM端'
      paths-to-match: /api/dm/**
    - group: 'admin'
      display-name: '管理员端'
      paths-to-match: /api/admin/**
    - group: 'session'
      display-name: '状态机'
      paths-to-match: /api/session/**

jwt:
  secret: scriptKillManagerSecretKeyForJWTTokenGeneration2024VeryLongSecretKeyThatIsAtLeastSixtyFourCharactersLongForHS512AlgorithmSecurity
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.scriptkill: DEBUG
    org.springframework.security: INFO
