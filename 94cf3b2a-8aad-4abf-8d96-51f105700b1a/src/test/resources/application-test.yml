server:
  port: 8081

spring:
  datasource:
    url: jdbc:sqlite:./data/test_scriptkill.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    enabled: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

jwt:
  secret: testSecretKeyForJWTTokenGenerationInTestingEnvironment
  expiration: 3600000
  refresh-expiration: 7200000
