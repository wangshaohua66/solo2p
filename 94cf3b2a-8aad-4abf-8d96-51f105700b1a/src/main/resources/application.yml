server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: script-kill-manager
  datasource:
    url: jdbc:sqlite:./data/scriptkill.db
    driver-class-name: org.sqlite.JDBC
    username: admin
    password: admin123
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: ScriptKillHikariPool
  jpa:
    hibernate:
      ddl-auto: none
    generate-ddl: false
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  mvc:
    static-path-pattern: /**
    async:
      request-timeout: 30000
  web:
    resources:
      static-locations: classpath:/static/,classpath:/META-INF/resources/
      cache:
        period: 3600
  task:
    scheduling:
      pool:
        size: 4

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: true
    layout: BaseLayout
    css:
      - /dark-theme.css
    supported-submit-methods:
      - get
      - post
      - put
      - delete
      - patch
  group-configs:
    - group: 'player'
      display-name: '玩家端'
      paths-to-match: /api/player/**
    - group: 'dm'
      display-name: 'DM端'
      paths-to-match: /api/dm/**,/api/clues/**,/api/session/**,/api/reviews/**,/api/scripts/**
    - group: 'admin'
      display-name: '管理员端'
      paths-to-match: /api/admin/**,/api/bookings/**,/api/dm/schedules/**,/api/purchases/**,/api/scripts/**
    - group: 'session'
      display-name: '状态机'
      paths-to-match: /api/session/**

jwt:
  secret: scriptKillManagerSecretKeyForJWTTokenGeneration2024VeryLongSecretKeyThatIsAtLeastSixtyFourCharactersLongForHS512AlgorithmSecurity
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.scriptkill: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
    org.hibernate.SQL: WARN

scriptkill:
  archive:
    cron: "0 0 2 * * ?"
    retention-days: 90
  deposit:
    force-enabled: true
  schedule:
    commission-base: 50
