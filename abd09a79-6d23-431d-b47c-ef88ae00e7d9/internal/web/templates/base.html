<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.PageTitle}} - 破产案件监控</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/static/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="/"><i class="bi bi-bank me-2"></i>破产案件监控</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/cases">案件列表</a>
      <a class="nav-link" href="/subscriptions">订阅管理</a>
      <a class="nav-link" href="/dead-letters">死信队列</a>
    </div>
  </div>
</nav>

<div class="container-fluid">
{{block "content" .}}<p>页面内容</p>{{end}}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<script>
if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission();
}
setInterval(() => {
  fetch("/api/hits")
    .then(r => r.json())
    .then(data => {
      if (data.total > 0 && Notification.permission === "granted") {
        data.items.slice(0,3).forEach(c => {
          new Notification("破产案件告警", { body: c.debtor + " - " + c.case_number });
        });
      }
    });
}, 60000);
</script>
</body>
</html>
