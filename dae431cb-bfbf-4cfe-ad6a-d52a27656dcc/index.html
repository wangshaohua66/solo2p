<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickVault - 乐高收藏管理工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.3/dist/themes/base/jquery-ui.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.11/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/colreorder/1.7.0/css/colReorder.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/select/1.7.0/css/select.bootstrap5.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <div class="app-container">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">🧱</span>
        <span class="brand-text">BrickVault</span>
      </div>
      <div class="sidebar-nav">
        <a href="#/dashboard" class="nav-item" data-route="dashboard">
          <i class="bi bi-speedometer2"></i><span>仪表盘</span>
        </a>
        <a href="#/inventory" class="nav-item" data-route="inventory">
          <i class="bi bi-boxes"></i><span>零件库</span>
        </a>
        <a href="#/sets" class="nav-item" data-route="sets">
          <i class="bi bi-box-seam"></i><span>套装管理</span>
        </a>
        <a href="#/moc" class="nav-item" data-route="moc">
          <i class="bi bi-brush"></i><span>MOC 档案</span>
        </a>
        <a href="#/auction" class="nav-item" data-route="auction">
          <i class="bi bi-hammer"></i><span>拍卖追踪</span>
        </a>
        <a href="#/valuation" class="nav-item" data-route="valuation">
          <i class="bi bi-bar-chart"></i><span>估值分析</span>
        </a>
        <a href="#/lug" class="nav-item" data-route="lug">
          <i class="bi bi-calendar-event"></i><span>社区活动</span>
        </a>
        <a href="#/import" class="nav-item" data-route="import">
          <i class="bi bi-file-earmark-arrow-up"></i><span>数据导入</span>
        </a>
      </div>
      <div class="sidebar-footer">
        <button class="btn-theme-toggle" id="themeToggle" title="切换主题">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
      </div>
    </nav>

    <button class="btn-sidebar-toggle d-lg-none" id="sidebarToggle" type="button">
      <i class="bi bi-list"></i>
    </button>

    <main class="main-content" id="mainContent">
      <div id="viewContainer" class="view-container">
        <div class="skeleton-loader">
          <div class="spinner-border text-lego-red" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal fade" id="genericModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="genericModalTitle">标题</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="genericModalBody"></div>
        <div class="modal-footer" id="genericModalFooter"></div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index: 9999;"></div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.3/dist/jquery-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.11/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.11/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/colreorder/1.7.0/js/dataTables.colReorder.min.js"></script>
  <script src="https://cdn.datatables.net/select/1.7.0/js/dataTables.select.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>
  <script src="js/table.js"></script>
  <script src="js/import.js"></script>
  <script src="js/visual.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
