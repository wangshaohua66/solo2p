<div class="page-header">
  <div>
    <h1 class="page-title">📦 零件库</h1>
    <p class="page-subtitle">多维检索、批量管理你的零件库存</p>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-lego-red" id="btnExportSelected">
      <i class="bi bi-download"></i> 导出选中
    </button>
    <button class="btn btn-lego-red" id="btnAddPart">
      <i class="bi bi-plus-lg"></i> 新增零件
    </button>
  </div>
</div>

<div class="filter-panel">
  <div class="row g-3 align-items-end">
    <div class="col-md-3">
      <label class="form-label">零件号搜索</label>
      <input type="text" class="form-control" id="searchPart" placeholder="如 3001">
    </div>
    <div class="col-md-2">
      <label class="form-label">颜色</label>
      <select class="form-select" id="filterColor">
        <option value="">全部颜色</option>
      </select>
    </div>
    <div class="col-md-2">
      <label class="form-label">类别</label>
      <select class="form-select" id="filterCategory">
        <option value="">全部类别</option>
      </select>
    </div>
    <div class="col-md-2">
      <label class="form-label">形状</label>
      <select class="form-select" id="filterShape">
        <option value="">全部形状</option>
      </select>
    </div>
    <div class="col-md-3 d-flex gap-2">
      <button class="btn btn-lego-red flex-fill" id="btnApplyFilter">
        <i class="bi bi-funnel"></i> 筛选
      </button>
      <button class="btn btn-outline-secondary flex-fill" id="btnResetFilter">
        <i class="bi bi-arrow-counterclockwise"></i> 重置
      </button>
    </div>
  </div>
</div>

<div class="card p-3">
  <div class="table-responsive">
    <table class="table table-hover align-middle" id="inventoryTable" style="width:100%"></table>
  </div>
</div>
