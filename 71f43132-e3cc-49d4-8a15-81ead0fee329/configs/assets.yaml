assets:
  - id: prod-mysql-01
    name: Production MySQL Primary
    component: mysql/mysql-server
    version: "8.0.32"
    version_range: ">=8.0.0, <8.0.35"
    environment: production
    owner: dba-team
    description: Primary production MySQL database

  - id: prod-mysql-02
    name: Production MySQL Replica
    component: mysql/mysql-server
    version: "8.0.32"
    version_range: ">=8.0.0, <8.0.35"
    environment: production
    owner: dba-team
    description: Read replica MySQL database

  - id: prod-postgres-01
    name: Production PostgreSQL
    component: postgresql/postgresql
    version: "14.5"
    version_range: ">=14.0, <14.10"
    environment: production
    owner: backend-team
    description: Main application database

  - id: prod-redis-01
    name: Production Redis Cluster
    component: redis/redis
    version: "7.0.11"
    version_range: ">=7.0.0, <7.2.0"
    environment: production
    owner: cache-team
    description: Session and cache store

  - id: prod-kafka-01
    name: Production Kafka Cluster
    component: apache/kafka
    version: "3.4.0"
    version_range: ">=3.0.0, <3.6.0"
    environment: production
    owner: data-platform
    description: Event streaming platform

  - id: prod-spring-01
    name: Backend API Services
    component: org.springframework/spring-boot
    version: "2.7.12"
    version_range: ">=2.7.0, <3.0.0"
    environment: production
    owner: backend-team
    description: Spring Boot microservices

  - id: prod-spring-02
    name: Spring Cloud Gateway
    component: org.springframework.cloud/spring-cloud-gateway
    version: "3.1.4"
    version_range: ">=3.1.0, <4.0.0"
    environment: production
    owner: backend-team
    description: API gateway services

  - id: prod-vue-01
    name: Customer Portal
    component: npm/vue
    version: "3.3.4"
    version_range: ">=3.0.0, <3.4.0"
    environment: production
    owner: frontend-team
    description: Customer-facing Vue 3 application

  - id: prod-react-01
    name: Admin Dashboard
    component: npm/react
    version: "18.2.0"
    version_range: ">=18.0.0, <19.0.0"
    environment: production
    owner: frontend-team
    description: Internal admin React application

  - id: prod-java-gateway
    name: Java API Gateway
    component: java-spring-cloud/gateway
    version: "3.1.5"
    version_range: ">=3.0.0, <4.0.0"
    environment: production
    owner: backend-team
    description: Spring Cloud Gateway

  - id: prod-go-services
    name: Go Microservices
    component: golang/go
    version: "1.21.0"
    version_range: ">=1.20.0, <1.22.0"
    environment: production
    owner: backend-team
    description: Go-based microservices runtime

  - id: staging-postgres
    name: Staging PostgreSQL
    component: postgresql/postgresql
    version: "15.2"
    version_range: ">=15.0, <16.0"
    environment: staging
    owner: backend-team
    description: Staging environment database
