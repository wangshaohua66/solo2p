<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陶釉实验室 - 釉料实验管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="clay-bg">
    <nav class="navbar navbar-expand-lg navbar-clay sticky-top shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-mortarboard-fill fs-3 me-2" style="color: #FAF6F0;"></i>
                <span class="brand-title">陶釉实验室</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="ms-auto d-flex gap-2 align-items-center flex-wrap">
                    <div class="input-group input-group-sm me-2" style="max-width: 260px;">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="globalSearch" class="form-control border-start-0 bg-transparent" placeholder="全文搜索原料名或备注...">
                    </div>
                    <div id="searchMatches" class="search-matches d-none"></div>
                    <button class="btn btn-clay btn-sm" data-bs-toggle="modal" data-bs-target="#expFormModal" id="btnNewExp">
                        <i class="bi bi-plus-lg me-1"></i>新建实验
                    </button>
                    <button class="btn btn-outline-clay btn-sm" id="btnMaterials">
                        <i class="bi bi-boxes me-1"></i>原料库
                    </button>
                    <button class="btn btn-outline-clay btn-sm" id="btnStats">
                        <i class="bi bi-bar-chart me-1"></i>统计
                    </button>
                    <div class="btn-group">
                        <button class="btn btn-outline-clay btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                            <i class="bi bi-database-gear me-1"></i>数据
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" id="btnExport"><i class="bi bi-download me-2"></i>导出JSON备份</a></li>
                            <li><a class="dropdown-item" href="#" id="btnImportTrigger"><i class="bi bi-upload me-2"></i>导入JSON备份</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="btnClearAll"><i class="bi bi-trash3 me-2"></i>清空所有数据</a></li>
                        </ul>
                    </div>
                    <input type="file" id="importFile" accept=".json" class="d-none">
                </div>
            </div>
        </div>
    </nav>

    <div class="d-none d-md-flex d-xl-none justify-content-center gap-2 py-2 border-bottom bg-body" id="mdViewToggle">
        <button class="btn btn-sm btn-outline-secondary" data-md-view="filter">
            <i class="bi bi-funnel me-1"></i>只看筛选
        </button>
        <button class="btn btn-sm btn-outline-secondary" data-md-view="list">
            <i class="bi bi-grid me-1"></i>只看列表
        </button>
        <button class="btn btn-sm btn-outline-secondary" data-md-view="default">
            <i class="bi bi-layout-three-columns me-1"></i>默认视图
        </button>
    </div>

    <div class="container-fluid main-layout">
        <div class="row g-0 h-100">
            <aside class="col-12 col-md-4 col-xl-2 filter-sidebar" id="filterSidebar">
                <div class="p-3">
                    <h6 class="sidebar-title mb-3"><i class="bi bi-funnel me-2"></i>筛选条件</h6>
                    
                    <div class="mb-3">
                        <label class="form-label small">釉色分类</label>
                        <div class="d-flex flex-wrap gap-1" id="filterGlaze">
                            <button class="btn tag-btn btn-sm" data-value="青瓷">青瓷</button>
                            <button class="btn tag-btn btn-sm" data-value="灰釉">灰釉</button>
                            <button class="btn tag-btn btn-sm" data-value="结晶">结晶</button>
                            <button class="btn tag-btn btn-sm" data-value="无光">无光</button>
                            <button class="btn tag-btn btn-sm" data-value="其他">其他</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">烧成气氛</label>
                        <div class="d-flex gap-2" id="filterAtmosphere">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="氧化" id="atmOx">
                                <label class="form-check-label small" for="atmOx">氧化</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="还原" id="atmRed">
                                <label class="form-check-label small" for="atmRed">还原</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">窑炉类型</label>
                        <select class="form-select form-select-sm" id="filterKiln">
                            <option value="">全部</option>
                            <option value="电窑">电窑</option>
                            <option value="气窑">气窑</option>
                            <option value="柴窑">柴窑</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">烧成锥号</label>
                        <div class="d-flex gap-2">
                            <select class="form-select form-select-sm" id="filterConeMin">
                                <option value="">从</option>
                                <option value="022">022</option><option value="018">018</option>
                                <option value="012">012</option><option value="06">06</option>
                                <option value="05">05</option><option value="04">04</option>
                                <option value="03">03</option><option value="02">02</option>
                                <option value="01">01</option><option value="1">1</option>
                                <option value="2">2</option><option value="3">3</option>
                                <option value="4">4</option><option value="5">5</option>
                                <option value="6">6</option><option value="7">7</option>
                                <option value="8">8</option><option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                            <select class="form-select form-select-sm" id="filterConeMax">
                                <option value="">到</option>
                                <option value="022">022</option><option value="018">018</option>
                                <option value="012">012</option><option value="06">06</option>
                                <option value="05">05</option><option value="04">04</option>
                                <option value="03">03</option><option value="02">02</option>
                                <option value="01">01</option><option value="1">1</option>
                                <option value="2">2</option><option value="3">3</option>
                                <option value="4">4</option><option value="5">5</option>
                                <option value="6">6</option><option value="7">7</option>
                                <option value="8">8</option><option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">包含原料</label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="filterMaterialInput" list="materialDatalist" placeholder="输入原料名...">
                            <button class="btn btn-outline-secondary" type="button" id="btnAddMaterialFilter"><i class="bi bi-plus"></i></button>
                        </div>
                        <datalist id="materialDatalist"></datalist>
                        <div class="d-flex flex-wrap gap-1 mt-2" id="selectedMaterials"></div>
                    </div>

                    <button class="btn btn-sm w-100 btn-outline-secondary" id="btnResetFilter">
                        <i class="bi bi-arrow-counterclockwise me-1"></i>重置筛选
                    </button>
                </div>
            </aside>

            <main class="col-12 col-md-8 col-xl-6 list-area">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom sticky-list-header bg-body">
                    <div>
                        <span class="badge rounded-pill bg-clay me-2" id="expCount">0</span>
                        <span class="text-muted small">条实验记录</span>
                        <span class="text-muted small ms-3" id="compareHint"></span>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-celadon" id="btnOpenCompare" disabled>
                            <i class="bi bi-layers me-1"></i>图像对比 <span id="compareCount" class="badge bg-clay ms-1">0</span>
                        </button>
                        <select class="form-select form-select-sm" id="sortSelect" style="width: auto;">
                            <option value="createdAt_desc">创建时间↓</option>
                            <option value="createdAt_asc">创建时间↑</option>
                            <option value="date_desc">实验日期↓</option>
                            <option value="date_asc">实验日期↑</option>
                            <option value="name_asc">名称A-Z</option>
                        </select>
                    </div>
                </div>
                <div class="p-3 list-scroll">
                    <div id="expList" class="row g-3"></div>
                    <div class="text-center py-3" id="paginationBar"></div>
                    <div id="emptyState" class="text-center py-5 d-none">
                        <i class="bi bi-droplet display-3 text-muted opacity-50"></i>
                        <p class="mt-3 text-muted">还没有实验记录，点击「新建实验」开始记录吧</p>
                    </div>
                </div>
            </main>

            <aside class="col-xl-4 detail-panel d-none d-xl-flex flex-column border-start" id="detailPanel">
                <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2">
                        <h6 class="mb-0"><i class="bi bi-journal-text me-2"></i>实验详情</h6>
                        <button class="btn btn-sm btn-outline-celadon" id="btnToggleMultiCurve" disabled><i class="bi bi-graph-up me-1"></i>对比曲线</button>
                    </div>
                    <span class="text-muted small" id="detailPanelHint">请选择一条记录</span>
                </div>
                <div class="flex-grow-1 overflow-auto p-3" id="detailPanelBody"></div>
                <div class="border-top p-3 d-none" id="multiCurveSection">
                    <h6 class="mb-2"><i class="bi bi-graph-up me-2"></i>多曲线对比</h6>
                    <canvas id="multiCurveChart" height="200"></canvas>
                </div>
            </aside>
        </div>
    </div>

    <div class="offcanvas offcanvas-end detail-offcanvas" tabindex="-1" id="detailOffcanvas">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="detailTitle">实验详情</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="detailBody"></div>
    </div>

    <div class="modal fade" id="expFormModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header border-bottom-clay">
                    <h5 class="modal-title" id="expFormTitle"><i class="bi bi-journal-plus me-2"></i>新建实验</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="expForm" class="modal-body">
                    <input type="hidden" id="expId">
                    
                    <div class="mb-4">
                        <h6 class="section-title"><i class="bi bi-info-circle me-2"></i>基础信息</h6>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label small">实验名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="expName" required placeholder="如：天青釉试片No.3">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">实验日期 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="expDate" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">釉色分类</label>
                                <select class="form-select" id="expCategory">
                                    <option value="青瓷">青瓷</option>
                                    <option value="灰釉">灰釉</option>
                                    <option value="结晶">结晶</option>
                                    <option value="无光">无光</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">窑炉类型</label>
                                <select class="form-select" id="expKiln">
                                    <option value="电窑">电窑</option>
                                    <option value="气窑">气窑</option>
                                    <option value="柴窑">柴窑</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small">烧成气氛</label>
                                <select class="form-select" id="expAtmosphere">
                                    <option value="氧化">氧化</option>
                                    <option value="还原">还原</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small">烧成锥号</label>
                                <select class="form-select" id="expCone">
                                    <option value="06">06</option><option value="05">05</option>
                                    <option value="04">04</option><option value="03">03</option>
                                    <option value="02">02</option><option value="01">01</option>
                                    <option value="1">1</option><option value="2">2</option>
                                    <option value="3">3</option><option value="4">4</option>
                                    <option value="5">5</option><option value="6">6</option>
                                    <option value="7">7</option><option value="8">8</option>
                                    <option value="9">9</option><option value="10">10</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h6 class="section-title d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-flask me-2"></i>原料配方</span>
                            <span class="small" id="recipeTotal">
                                合计: <strong id="recipeTotalVal">0.0</strong>%
                                <span id="recipeTotalBadge" class="badge ms-1">--</span>
                            </span>
                        </h6>
                        <div class="table-responsive">
                            <table class="table table-sm align-middle" id="recipeTable">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 45%;">原料名称</th>
                                        <th style="width: 25%;">含量(%)</th>
                                        <th style="width: 20%;">典型范围</th>
                                        <th style="width: 10%;"></th>
                                    </tr>
                                </thead>
                                <tbody id="recipeBody"></tbody>
                            </table>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="btnAddRecipeRow">
                            <i class="bi bi-plus me-1"></i>添加原料
                        </button>
                    </div>

                    <div class="mb-4">
                        <h6 class="section-title d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-graph-up me-2"></i>烧成曲线</span>
                            <button type="button" class="btn btn-sm btn-outline-celadon" id="btnCurvePreview">
                                <i class="bi bi-eye me-1"></i>预览
                            </button>
                        </h6>
                        <div class="table-responsive">
                            <table class="table table-sm align-middle" id="curveTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>阶段</th>
                                        <th>类型</th>
                                        <th>起始温度(℃)</th>
                                        <th>目标温度(℃)</th>
                                        <th>时长(分钟)</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="curveBody"></tbody>
                            </table>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="btnAddCurveRow">
                            <i class="bi bi-plus me-1"></i>添加阶段
                        </button>
                    </div>

                    <div class="mb-4">
                        <h6 class="section-title"><i class="bi bi-camera me-2"></i>照片与缺陷</h6>
                        <div class="mb-3">
                            <label class="form-label small">釉面照片（最多6张，单张≤1MB）</label>
                            <div class="border border-dashed rounded p-3 text-center photo-upload-area" id="photoDropArea">
                                <i class="bi bi-cloud-arrow-up display-6 text-muted"></i>
                                <p class="small text-muted mt-2 mb-0">点击或拖拽图片到此处</p>
                                <input type="file" id="photoInput" accept="image/*" multiple class="d-none">
                            </div>
                            <div class="row g-2 mt-2" id="photoPreview"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">缺陷标签</label>
                            <div class="d-flex flex-wrap gap-1" id="defectTagsContainer">
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="针孔">针孔</button>
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="气泡">气泡</button>
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="缩釉">缩釉</button>
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="流釉">流釉</button>
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="裂纹">裂纹</button>
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="发色不均">发色不均</button>
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="结晶不良">结晶不良</button>
                                <button type="button" class="btn defect-tag-btn btn-sm" data-value="无光不足">无光不足</button>
                            </div>
                        </div>
                        <div>
                            <label class="form-label small">备注</label>
                            <textarea class="form-control" id="expNotes" rows="3" placeholder="施釉厚度、胎体材质、观察到的特殊现象..."></textarea>
                        </div>
                    </div>
                </form>
                <div class="modal-footer border-top">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-clay" id="btnSaveExp">
                        <i class="bi bi-check2 me-1"></i>保存实验
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="curvePreviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-bottom-clay">
                    <h5 class="modal-title"><i class="bi bi-graph-up me-2"></i>烧成曲线预览</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <canvas id="curvePreviewChart" height="260"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="compareModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header border-bottom-clay">
                    <h5 class="modal-title"><i class="bi bi-layers me-2"></i>图像对比器</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <div class="d-flex align-items-center gap-2">
                            <label class="form-label small mb-0">缩放:</label>
                            <input type="range" min="50" max="300" value="100" id="compareZoom" class="form-range" style="width: 160px;">
                            <span class="small text-muted" id="compareZoomVal">100%</span>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="compareShowLabels">
                            <label class="form-check-label small" for="compareShowLabels">显示标签叠加</label>
                        </div>
                    </div>
                    <div class="compare-grid" id="compareGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="materialModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header border-bottom-clay">
                    <h5 class="modal-title"><i class="bi bi-boxes me-2"></i>原料库管理</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form class="row g-2 mb-3 border-bottom pb-3" id="materialForm">
                        <input type="hidden" id="matId">
                        <div class="col-md-4">
                            <input type="text" class="form-control form-control-sm" id="matName" placeholder="原料名称*" required>
                        </div>
                        <div class="col-md-3">
                            <input type="text" class="form-control form-control-sm" id="matFormula" placeholder="化学式 如 SiO₂">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="matMin" placeholder="最小%" step="0.1">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="matMax" placeholder="最大%" step="0.1">
                        </div>
                        <div class="col-md-1 d-grid">
                            <button type="submit" class="btn btn-clay btn-sm"><i class="bi bi-plus"></i></button>
                        </div>
                        <div class="col-12">
                            <input type="text" class="form-control form-control-sm" id="matNotes" placeholder="备注说明">
                        </div>
                    </form>
                    <div class="table-responsive">
                        <table class="table table-sm table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>名称</th>
                                    <th>化学式</th>
                                    <th>典型范围</th>
                                    <th>使用次数</th>
                                    <th>备注</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="materialTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="statsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header border-bottom-clay">
                    <h5 class="modal-title"><i class="bi bi-bar-chart me-2"></i>统计面板</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" id="statsTabs">
                        <li class="nav-item">
                            <button class="nav-link active" data-tab="glaze">原料×釉色热力图</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-tab="defect">原料×缺陷热力图</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-tab="overview">数据概览</button>
                        </li>
                    </ul>
                    <div id="statsContent">
                        <canvas id="statsChart" height="320"></canvas>
                        <div id="overviewStats" class="row g-3 mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle display-5 text-warning d-block mb-3"></i>
                    <p id="confirmMessage" class="mb-0">确认删除？</p>
                </div>
                <div class="modal-footer justify-content-center border-0 pt-0">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger btn-sm" id="confirmOk">确认</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>

    <script src="assets/js/state.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/components/firingCurve.js"></script>
    <script src="assets/js/utils/search.js"></script>
    <script src="assets/js/utils/exporter.js"></script>
    <script src="assets/js/components/expForm.js"></script>
    <script src="assets/js/components/expList.js"></script>
    <script src="assets/js/components/expDetail.js"></script>

    <script>
        $(document).ready(function() {
            function initAll() {
                AppState.publish('db:ready');
                ExpList.init();
                ExpForm.init();
                ExpDetail.init();
                SearchUtil.init();
                Exporter.init();
                FiringCurve.initGlobalCharts();
            }
            AppDB.init().then(initAll).catch(function(err) {
                console.warn('DB init fallback, continuing UI:', err);
                AppState.set('materialsCache', [
                    {name:'长石'},{name:'石英'},{name:'高岭土'},{name:'碳酸钙'},
                    {name:'氧化锌'},{name:'氧化镁'},{name:'碳酸钡'},{name:'氧化铁'},
                    {name:'氧化钛'},{name:'氧化铜'},{name:'氧化钴'},{name:'氧化锰'},
                    {name:'骨灰'},{name:'硼砂'},{name:'瓷土'},{name:'球土'}
                ]);
                initAll();
            });

            AppState.subscribe('toast:show', function(data) {
                var toastId = 'toast_' + Date.now();
                var bgClass = data.type === 'success' ? 'bg-success' : 
                              data.type === 'error' ? 'bg-danger' : 
                              data.type === 'warning' ? 'bg-warning' : 'bg-info';
                var icon = data.type === 'success' ? 'bi-check-circle-fill' : 
                           data.type === 'error' ? 'bi-x-circle-fill' : 
                           data.type === 'warning' ? 'bi-exclamation-triangle-fill' : 'bi-info-circle-fill';
                $('#toastContainer').append(
                    '<div class="toast align-items-center text-white border-0 ' + bgClass + '" id="' + toastId + '" role="alert">' +
                    '<div class="d-flex"><div class="toast-body"><i class="bi ' + icon + ' me-2"></i>' + data.message + '</div>' +
                    '<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>'
                );
                var bsToast = new bootstrap.Toast(document.getElementById(toastId), { delay: 2500 });
                bsToast.show();
                $('#' + toastId).on('hidden.bs.toast', function() { $(this).remove(); });
            });
        });
    </script>
</body>
</html>
