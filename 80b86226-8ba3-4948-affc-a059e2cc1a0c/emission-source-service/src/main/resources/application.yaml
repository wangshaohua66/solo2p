server:
  port: 8081

spring:
  application:
    name: emission-source-service
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NS:carbon-dev}
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://127.0.0.1:27017/emission_source}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1
      lettuce:
        pool:
          max-active: 200
          max-idle: 30
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

security:
  jwt:
    secret: carbon-management-platform-super-secret-key-2024-please-change
  whitelist:
    - /actuator/**
    - /v3/api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /webjars/**

emission:
  interpolation:
    window-size: 3
    min-neighbors: 2
  source:
    default-batch-size: 200
  activity:
    import-chunk-size: 1000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.carbon.emission: DEBUG
    org.springframework.data.mongodb: INFO
