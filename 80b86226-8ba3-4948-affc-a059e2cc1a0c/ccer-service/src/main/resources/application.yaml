server:
  port: 8086

spring:
  application:
    name: ccer-service
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NS:carbon-dev}
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://127.0.0.1:27017/ccer}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 6

security:
  jwt:
    secret: carbon-management-platform-super-secret-key-2024-please-change
  whitelist:
    - /actuator/**
    - /v3/api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /webjars/**

ccer:
  methodologies:
    - CM-001-V01
    - CM-002-V01
    - CM-003-V02
    - CM-011-V01
    - CM-012-V01
  issuance:
    min-verification-interval-months: 6
    default-leakage-factor: 0.02
    buffer-percent: 2

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.carbon.ccer: DEBUG
